<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>딸깍 — 학생 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#EEF3FF',100:'#D9E5FF',200:'#B3CBFF',400:'#4880FF',500:'#1952D9',600:'#1441B5',700:'#0F318F' },
            amber:  { 500:'#F5621A',600:'#D9500F' },
            ink:    { DEFAULT:'#0C0B09',2:'#2D2C2A',3:'#6B6A68',4:'#9C9B99',5:'#C8C7C5',6:'#E5E4E1',7:'#F2F1EE',8:'#F9F8F6' },
            ok:     { DEFAULT:'#059669', light:'#DCFCE7' },
          },
          fontFamily: {
            display: ['"Black Han Sans"','sans-serif'],
            body:    ['"DM Sans"','system-ui','sans-serif'],
            mono:    ['"DM Mono"','monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="/db.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #FAFAF8; color: #0C0B09; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    .tc { transition:color 0.15s ease; }
    .tb { transition:background 0.15s ease; }

    /* Top nav */
    #top-nav { background:#fff;border-bottom:1px solid #E5E4E1;position:sticky;top:0;z-index:50; }
    .nav-tab { padding:7px 11px;border-radius:7px;font-size:13.5px;font-weight:500;color:#6B6A68;background:transparent;border:none;cursor:pointer;transition:background 0.12s,color 0.12s;display:inline-flex;align-items:center;gap:4px; }
    .nav-tab:hover { background:#F5F4F1;color:#0C0B09; }
    .nav-tab.active { background:#EEF3FF;color:#1952D9;font-weight:600; }

    /* Cards */
    .card { background:#fff;border:1px solid #EBEBEA;border-radius:14px;padding:20px; }
    .card-sm { background:#fff;border:1px solid #EBEBEA;border-radius:12px;padding:16px; }

    /* Job card */
    .job-card { background:#fff;border:1px solid #EBEBEA;border-radius:14px;padding:20px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s,transform 0.15s; }
    .job-card:hover { border-color:#D4D3D0;box-shadow:0 4px 20px rgba(0,0,0,0.05);transform:translateY(-1px); }
    .job-card.applied { border-left:3px solid #059669; }
    .job-card.new { border-left:3px solid #1952D9; }

    /* Status badge */
    .badge { display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;font-family:'DM Mono',monospace; }
    .badge-blue  { background:#EEF3FF;color:#1952D9; }
    .badge-green { background:#DCFCE7;color:#059669; }
    .badge-amber { background:#FFF7ED;color:#F5621A; }
    .badge-gray  { background:#F2F1EE;color:#6B6A68; }
    .badge-ink   { background:#0C0B09;color:#fff; }

    /* Match score ring */
    .score-ring { position:relative;width:48px;height:48px;flex-shrink:0; }
    .score-ring svg { transform:rotate(-90deg); }
    .score-ring .pct { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'DM Mono',monospace; }

    .ttalkkak-btn {
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 18px;border-radius:10px;
      background:#1952D9;color:#fff;font-size:13.5px;font-weight:600;
      border:none;cursor:pointer;position:relative;overflow:hidden;
      transition:background 0.15s,transform 0.12s,box-shadow 0.15s;
      box-shadow:0 2px 8px rgba(25,82,217,0.25);
    }
    .ttalkkak-btn:hover { background:#1441B5;box-shadow:0 4px 16px rgba(25,82,217,0.35); }
    .ttalkkak-btn:active { transform:scale(0.97); }
    .ttalkkak-btn::after { content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.15) 50%,transparent 65%);transform:translateX(-100%);transition:transform 0.5s ease; }
    .ttalkkak-btn:hover::after { transform:translateX(100%); }

    /* Pipeline track */
    .pipe-step { flex:1;text-align:center;position:relative; }
    .pipe-step:not(:last-child)::after { content:'';position:absolute;right:-1px;top:50%;width:2px;height:24px;transform:translateY(-50%);background:#E5E4E1; }
    .pipe-step.done .pipe-dot { background:#059669;border-color:#059669; }
    .pipe-step.active .pipe-dot { background:#1952D9;border-color:#1952D9;box-shadow:0 0 0 4px rgba(25,82,217,0.15); }
    .pipe-dot { width:12px;height:12px;border-radius:50%;border:2px solid #C8C7C5;background:#fff;margin:0 auto 6px; }

    /* Search input */
    .search-input { width:100%;padding:9px 14px 9px 38px;border:1.5px solid #E5E4E1;border-radius:10px;font-size:13.5px;background:#F9F8F6;color:#0C0B09;outline:none;font-family:'DM Sans',system-ui;transition:border-color 0.15s,background 0.15s; }
    .search-input:focus { border-color:#1952D9;background:#fff;box-shadow:0 0 0 3px rgba(25,82,217,0.08); }

    /* Rounded chip (profile interests) */
    .chip { padding:5px 12px;border-radius:999px;font-size:12.5px;font-weight:500;border:1.5px solid #E5E4E1;color:#6B6A68;cursor:pointer;transition:border-color 0.15s,color 0.15s,background 0.15s; }
    .chip:hover { border-color:#9C9B99; }
    .chip.on { border-color:#1952D9;color:#1952D9;background:#EEF3FF; }

    /* Square filter chip (discover filters) */
    .fchip { display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:5px;font-size:13px;font-weight:500;border:1.5px solid #E5E4E1;color:#6B6A68;background:#fff;cursor:pointer;white-space:nowrap;transition:border-color 0.15s,color 0.15s; }
    .fchip:hover { border-color:#9C9B99; }
    .fchip.on { color:#0C0B09; }
    .fchip-box { width:12px;height:12px;border-radius:2px;border:1.5px solid #C8C7C5;flex-shrink:0;position:relative;transition:background 0.15s,border-color 0.15s; }
    .fchip.on .fchip-box { background:#1952D9;border-color:#1952D9; }
    .fchip.on .fchip-box::after { content:'';position:absolute;top:1px;left:2.5px;width:4px;height:7px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg) scaleY(0.65); }
    /* Vertical filter list: fchips become full-width */
    .fchip-list { display:flex;flex-direction:column;gap:3px; }
    .fchip-list .fchip { width:100%;justify-content:flex-start; }

    /* Tooltip */
    .tip { position:relative; }
    .tip::after { content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0C0B09;color:#fff;font-size:11.5px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s; }
    .tip:hover::after { opacity:1; }

    /* Fade in */
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fu { animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .fu1 { animation-delay:0.05s } .fu2 { animation-delay:0.1s } .fu3 { animation-delay:0.15s }
    .fu4 { animation-delay:0.2s  } .fu5 { animation-delay:0.25s} .fu6 { animation-delay:0.3s }
    .fu7 { animation-delay:0.35s }

    /* AI features */
    @keyframes spin { to { transform:rotate(360deg) } }
    .ai-spinner { animation:spin 0.75s linear infinite; display:inline-block; }
    @keyframes aiReveal { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .ai-item { animation:aiReveal 0.28s cubic-bezier(0.16,1,0.3,1) both; }
    .fit-bar-wrap { height:5px;background:#F2F1EE;border-radius:999px;overflow:hidden;margin-top:5px; }
    .fit-bar { height:100%;border-radius:999px;transition:width 1s cubic-bezier(0.16,1,0.3,1); }

    /* Live dot */
    @keyframes ping { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.7);opacity:0.5} }
    .live { animation:ping 2s ease-in-out infinite; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#C8C7C5;border-radius:3px; }

    /* Apply animation */
    @keyframes ttalkkak { 0%{transform:scale(1)} 20%{transform:scale(0.93)} 55%{transform:scale(1.07)} 80%{transform:scale(0.98)} 100%{transform:scale(1)} }
    .ttalkkak-anim { animation:ttalkkak 0.5s cubic-bezier(0.34,1.56,0.64,1); }

    /* Toast */
    #toast { position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);opacity:0;background:#0C0B09;color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:500;z-index:999;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap; }
    #toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

    /* Student detail panel (company page reuses this via #student-panel) */

    /* Modal overlay */
    #apply-modal { position:fixed;inset:0;background:rgba(12,11,9,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s; }
    #apply-modal.open { opacity:1;pointer-events:auto; }
    .modal-sheet { background:#fff;border-radius:20px 20px 0 0;padding:28px 24px 36px;width:100%;max-width:520px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1); }
    #apply-modal.open .modal-sheet { transform:translateY(0); }

    button:focus-visible { outline:2px solid #1952D9;outline-offset:3px;border-radius:6px; }

    /* Edit modal */
    #edit-modal { position:fixed;inset:0;z-index:200;background:rgba(12,11,9,0.45);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:16px; }
    #edit-modal.open { display:flex; }
    .edit-sheet { background:#fff;border-radius:20px;padding:28px 26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.18); }
    .edit-sheet .ef { position:relative;margin-bottom:16px; }
    .edit-sheet .ef label { display:block;font-size:11.5px;font-weight:600;color:#6B6A68;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em; }
    .edit-sheet .ef input, .edit-sheet .ef select, .edit-sheet .ef textarea { width:100%;padding:10px 13px;border:1.5px solid #E5E4E1;border-radius:9px;font-size:13.5px;font-family:'DM Sans',system-ui;background:#fff;color:#0C0B09;outline:none;transition:border-color 0.15s,box-shadow 0.15s; }
    .edit-sheet .ef input:focus,.edit-sheet .ef select:focus,.edit-sheet .ef textarea:focus { border-color:#1952D9;box-shadow:0 0 0 3px rgba(25,82,217,0.08); }
    .edit-sheet .ef textarea { resize:vertical;min-height:72px; }

    /* Photo avatar hover */
    .prof-photo-wrap { position:relative;cursor:pointer;display:inline-block; }
    .prof-photo-wrap:hover .prof-photo-overlay { opacity:1; }
    .prof-photo-overlay { position:absolute;inset:0;border-radius:16px;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s; }

    /* Resume drop zone */
    .resume-drop { border:2px dashed #E5E4E1;border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s; }
    .resume-drop:hover { border-color:#B3CBFF;background:#F5F8FF; }

    /* Calendar */
    .cal-day { min-height:72px;padding:6px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;transition:border-color 0.12s,background 0.12s; }
    .cal-day:hover { border-color:#E5E4E1;background:#F9F8F6; }
    .cal-day.today { border-color:#1952D9;background:#EEF3FF; }
    .cal-day.selected { border-color:#1952D9;background:#EEF3FF; }
    .cal-dot { height:4px;border-radius:2px;margin-top:2px; }

    /* Split message layout */
    .msg-split { display:flex;height:calc(100vh - 56px); }
    .msg-sidebar { width:280px;flex-shrink:0;border-right:1px solid #E5E4E1;display:flex;flex-direction:column;overflow:hidden; }
    .msg-thread-item { display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #F2F1EE;transition:background 0.12s; }
    .msg-thread-item:hover { background:#F9F8F6; }
    .msg-thread-item.active { background:#EEF3FF; }
    .msg-chat { flex:1;display:flex;flex-direction:column;min-width:0; }
    .msg-bubble-wrap { display:flex;align-items:flex-end;gap:8px;margin-bottom:12px; }
    .msg-bubble-wrap.mine { flex-direction:row-reverse; }
    .msg-bubble { display:inline-block;max-width:520px;width:max-content;padding:10px 14px;border-radius:18px;font-size:13.5px;line-height:1.55;word-break:break-word;overflow-wrap:anywhere; }
    .msg-bubble.theirs { background:#F2F1EE;color:#2D2C2A;border-bottom-left-radius:4px; }
    .msg-bubble.mine { background:#1952D9;color:#fff;border-bottom-right-radius:4px; }
    .msg-avatar { width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700; }
  </style>
</head>
<body>
<div id="toast">✓ 지원 완료!</div>

<!-- ── Top Navigation ────────────────────────────────────────── -->
<nav id="top-nav">
  <div class="max-w-screen-xl mx-auto px-5 h-14 flex items-center gap-3">
    <a href="app-student.html" class="font-display text-[18px] text-ink mr-3">딸깍<span class="text-brand-500">.</span></a>
    <div class="flex items-center gap-0.5 flex-1">
      <button class="nav-tab active" onclick="showView('discover',this)">공고 탐색</button>
      <button class="nav-tab" onclick="showView('applied',this)">
        지원 현황
        <span class="text-[10px] font-mono bg-brand-500 text-white rounded-full px-1.5 py-0.5 leading-none" id="applied-badge">0</span>
      </button>
      <button class="nav-tab" onclick="showView('saved',this)">저장한 공고</button>
      <button class="nav-tab" onclick="showView('calendar',this)">면접 일정</button>
    </div>
    <div class="flex items-center gap-1.5">
      <button class="relative w-9 h-9 rounded-lg flex items-center justify-center text-ink-4 hover:bg-ink-8 hover:text-ink" onclick="showView('messages',this)" style="transition:background 0.12s,color 0.12s" title="메시지">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span id="msg-unread-dot" class="absolute top-1 right-1 w-2.5 h-2.5 rounded-full bg-amber-500 border-2 border-white" style="display:none"></span>
      </button>
      <button class="w-9 h-9 rounded-full bg-brand-500 flex items-center justify-center text-white font-bold text-sm hover:opacity-90 transition-opacity" onclick="showView('profile',this)" id="nav-avatar" title="내 프로필">김</button>
      <button class="w-9 h-9 rounded-lg flex items-center justify-center text-ink-4 hover:bg-ink-8 hover:text-ink" onclick="DB.auth.clearSession();window.location.href='auth.html'" style="transition:background 0.12s,color 0.12s" title="로그아웃">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</nav>

<main>

    <!-- ── VIEW: Discover ──────────────────────────────────────── -->
    <div id="view-discover">
      <!-- Sticky search bar -->
      <div class="sticky z-10 bg-white/95 backdrop-blur-sm border-b border-ink-6" style="top:56px">
        <div class="max-w-5xl mx-auto px-6 py-3 flex items-center gap-3">
          <div class="relative flex-1">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-ink-4" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="job-search" class="search-input" placeholder="회사명, 직무, 기술, 지역, 급여 검색..." oninput="applyFilters()"/>
          </div>
          <select id="sort-select" onchange="applyFilters()" class="text-[12.5px] text-ink-3 border border-ink-6 bg-white rounded-lg px-3 py-2 outline-none cursor-pointer flex-shrink-0">
            <option value="match">매칭순</option>
            <option value="newest">최신순</option>
            <option value="deadline">마감 임박</option>
            <option value="pay">급여 높은순</option>
          </select>
        </div>
      </div>

      <!-- Two-column layout: filters left, jobs right -->
      <div class="max-w-5xl mx-auto px-6 py-6 flex gap-8 items-start">

        <!-- Left: vertical filter sidebar -->
        <aside class="w-40 flex-shrink-0 space-y-6 sticky" style="top:112px">
          <div>
            <p class="text-[10px] font-bold text-ink-4 uppercase tracking-wider mb-2">직무</p>
            <div class="fchip-list">
              <button class="fchip on" data-filter="field" data-value="" onclick="setFilter(this,'field')"><span class="fchip-box"></span>전체</button>
              <button class="fchip" data-filter="field" data-value="개발" onclick="setFilter(this,'field')"><span class="fchip-box"></span>개발</button>
              <button class="fchip" data-filter="field" data-value="디자인" onclick="setFilter(this,'field')"><span class="fchip-box"></span>디자인</button>
              <button class="fchip" data-filter="field" data-value="마케팅" onclick="setFilter(this,'field')"><span class="fchip-box"></span>마케팅</button>
              <button class="fchip" data-filter="field" data-value="기획" onclick="setFilter(this,'field')"><span class="fchip-box"></span>기획</button>
              <button class="fchip" data-filter="field" data-value="데이터" onclick="setFilter(this,'field')"><span class="fchip-box"></span>데이터</button>
              <button class="fchip" data-filter="field" data-value="영업" onclick="setFilter(this,'field')"><span class="fchip-box"></span>영업</button>
            </div>
          </div>
          <div>
            <p class="text-[10px] font-bold text-ink-4 uppercase tracking-wider mb-2">근무지</p>
            <div class="fchip-list">
              <button class="fchip on" data-filter="location" data-value="" onclick="setFilter(this,'location')"><span class="fchip-box"></span>전국</button>
              <button class="fchip" data-filter="location" data-value="서울" onclick="setFilter(this,'location')"><span class="fchip-box"></span>서울</button>
              <button class="fchip" data-filter="location" data-value="원격" onclick="setFilter(this,'location')"><span class="fchip-box"></span>원격</button>
              <button class="fchip" data-filter="location" data-value="하이브리드" onclick="setFilter(this,'location')"><span class="fchip-box"></span>하이브리드</button>
            </div>
          </div>
          <div>
            <p class="text-[10px] font-bold text-ink-4 uppercase tracking-wider mb-2">기간</p>
            <div class="fchip-list">
              <button class="fchip on" data-filter="period" data-value="" onclick="setFilter(this,'period')"><span class="fchip-box"></span>전체</button>
              <button class="fchip" data-filter="period" data-value="3개월" onclick="setFilter(this,'period')"><span class="fchip-box"></span>3개월</button>
              <button class="fchip" data-filter="period" data-value="6개월" onclick="setFilter(this,'period')"><span class="fchip-box"></span>6개월</button>
              <button class="fchip" data-filter="period" data-value="장기" onclick="setFilter(this,'period')"><span class="fchip-box"></span>장기</button>
            </div>
          </div>
        </aside>

        <!-- Right: job list -->
        <div class="flex-1 min-w-0 space-y-3">
          <h2 class="font-semibold text-[15px] text-ink">공고 <span class="text-ink-4 font-normal text-[13px]" id="job-count-label"></span></h2>
          <div id="job-list" class="space-y-3"></div>
        </div>

      </div>
    </div>

    <!-- ── VIEW: Applied ────────────────────────────────────────── -->
    <div id="view-applied" class="hidden">
      <div class="max-w-3xl mx-auto px-6 py-8 space-y-6">
        <div class="fu fu1">
          <h1 class="font-bold text-xl text-ink">지원 현황</h1>
          <p class="text-ink-3 text-sm mt-1" id="applied-summary">총 <span class="text-brand-500 font-semibold">0건</span> 지원</p>
        </div>
        <div class="card fu fu2" id="applied-pipeline"></div>
        <div class="space-y-3" id="applied-cards"></div>
      </div>
    </div>

    <!-- ── VIEW: Saved ──────────────────────────────────────────── -->
    <div id="view-saved" class="hidden">
      <div class="max-w-3xl mx-auto px-6 py-8">
        <div class="fu fu1 mb-6">
          <h1 class="font-bold text-xl text-ink">저장한 공고</h1>

              <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" class="mx-auto mb-3 opacity-30"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

<script>
  // ── Session guard ─────────────────────────────────────────────
  const _session = DB.auth.getSession();
  if(!_session) window.location.replace('auth.html');
  if(_session && _session.schoolColor) DB.applyTheme(_session.schoolColor);

  // ── View switching ────────────────────────────────────────────
  const views = ['discover','applied','saved','calendar','profile','messages'];
  function showView(v, el){
    views.forEach(id=>{
      const e=document.getElementById('view-'+id);
      if(e) e.classList.toggle('hidden',id!==v);
    });
    document.querySelectorAll('.nav-tab').forEach(n=>n.classList.remove('active'));
    if(el && el.classList.contains('nav-tab')) el.classList.add('active');
    if(v==='applied') buildApplied();
    if(v==='messages') buildMessages();
    if(v==='discover') buildJobList();
    if(v==='saved') buildSavedList();
    if(v==='profile') buildProfileView(_session);
    if(v==='calendar') buildCalendar();
  }

  // ── Filter state + logic ──────────────────────────────────────
  const filters = { text:'', field:'', location:'', period:'', sort:'match' };

  function setFilter(el, type){
    document.querySelectorAll('[data-filter="'+type+'"]').forEach(c=>c.classList.remove('on'));
    el.classList.add('on');
    filters[type] = el.dataset.value;
    buildJobList();
  }

  function applyFilters(){
    filters.text = (document.getElementById('job-search')?.value||'').toLowerCase();
    filters.sort = document.getElementById('sort-select')?.value || 'match';
    buildJobList();
  }

  function getFilteredJobs(){
    let jobs = DB.getJobs().map(j=>({...j, _score: computeMatchScore(j)}));
    if(filters.text){
      const q = filters.text;
      jobs = jobs.filter(j =>
        j.title?.toLowerCase().includes(q) ||
        j.companyName?.toLowerCase().includes(q) ||
        j.field?.toLowerCase().includes(q) ||
        (j.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
        (j.location||j.loc||'').toLowerCase().includes(q) ||
        j.description?.toLowerCase().includes(q) ||
        j.pay?.toLowerCase().includes(q)
      );
    }
    if(filters.field) jobs = jobs.filter(j => j.field===filters.field || (j.tags||[]).some(t=>t.includes(filters.field)));
    if(filters.location) jobs = jobs.filter(j => (j.location||j.loc||'').includes(filters.location));
    if(filters.period) jobs = jobs.filter(j => (j.period||'').includes(filters.period));
    if(filters.sort==='match') jobs.sort((a,b)=>b._score-a._score);
    else if(filters.sort==='newest') jobs.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    else if(filters.sort==='deadline') jobs.sort((a,b)=>(a.deadline||'').localeCompare(b.deadline||''));
    else if(filters.sort==='pay') jobs.sort((a,b)=>{
      const pa = parseInt((a.pay||'').replace(/\D/g,''))||0;
      const pb = parseInt((b.pay||'').replace(/\D/g,''))||0;
      return pb-pa;
    });
    return jobs;
  }

  // ── Match score computation ───────────────────────────────────
  function computeMatchScore(job) {
    const interests = _session.interests || [];
    const tags = job.tags || [];
    let score = 55;
    interests.forEach(i => {
      if(tags.some(t => t.toLowerCase().includes(i.toLowerCase()) || i.toLowerCase().includes(t.toLowerCase()))) score += 12;
    });
    return Math.min(score, 99);
  }

  let currentJob = null;

  function buildJobList(){
    const jobs = getFilteredJobs();
    const list = document.getElementById('job-list');
    const countEl = document.getElementById('job-count-label');
    if(countEl) countEl.textContent = jobs.length + '개';
    if(!jobs.length){
      list.innerHTML = '<div class="text-center py-16 text-ink-4"><div class="text-3xl mb-3">🔍</div><p class="font-medium">검색 결과가 없습니다</p><p class="text-sm mt-1">필터를 변경하거나 다른 키워드로 검색해보세요.</p></div>';
      const apps = DB.getApplications({studentEmail: _session.email});
      const badge = document.getElementById('applied-badge');
      if(badge) badge.textContent = apps.length;
      return;
    }
    list.innerHTML = '';
    jobs.forEach((j,i)=>{
      const score = computeMatchScore(j);
      const alreadyApplied = DB.hasApplied(_session.email, j.id);
      const div = document.createElement('div');
      div.className = 'job-card fu fu'+(i+2)+' '+(j.status||'');
      div.style.animationDelay=(i*0.06+0.1)+'s';
      div.innerHTML = `
        <div class="flex items-start gap-3">
          <div class="w-11 h-11 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0" style="background:${j.logoBg||'#F2F1EE'};color:${j.logoColor||'#6B6A68'}">${j.logo||'?'}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2">
              <div>
                <div class="font-semibold text-[14px] text-ink">${j.companyName||j.company||'—'}</div>
                <div class="text-[13px] text-ink-3 mt-0.5">${j.title||j.role||'—'}</div>
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                ${j.status==='new'?'<span class="badge badge-ink text-[10px]">NEW</span>':''}
                ${alreadyApplied?'<span class="badge badge-green text-[10px]">지원완료</span>':''}
                <div class="score-ring tip" data-tip="매칭 점수">
                  <svg width="48" height="48" viewBox="0 0 48 48">
                    <circle cx="24" cy="24" r="18" fill="none" stroke="#E5E4E1" stroke-width="3"/>
                    <circle cx="24" cy="24" r="18" fill="none" stroke="${score>=80?'#059669':score>=65?'#1952D9':'#9C9B99'}" stroke-width="3" stroke-dasharray="${(score/100)*113.1} 113.1" stroke-linecap="round"/>
                  </svg>
                  <div class="pct" style="color:${score>=80?'#059669':score>=65?'#1952D9':'#6B6A68'}">${score}</div>
                </div>
              </div>
            </div>
            <div class="flex flex-wrap gap-1.5 mt-2.5">
              ${(j.tags||[]).map(t=>'<span class="badge badge-gray">'+t+'</span>').join('')}
            </div>
            <div class="flex items-center justify-between mt-3">
              <div class="flex items-center gap-3 text-[12px] text-ink-4">
                <span>📅 ${j.deadline||'—'} 마감</span>
                <span>📍 ${j.loc||j.location||'—'}</span>
                <span>💰 ${j.pay||'—'}</span>
              </div>
              <button class="ttalkkak-btn text-[12.5px] py-2 px-3.5" onclick="openModal('${j.id}',event)">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                딸깍
              </button>
            </div>
          </div>
        </div>
      `;
      list.appendChild(div);
    });

    // Update applied badge
    const apps = DB.getApplications({studentEmail: _session.email});
    const badge = document.getElementById('applied-badge');
    if(badge) badge.textContent = apps.length;

    // Unread dot
    const unread = DB.getUnread(_session.email);
    const dot = document.getElementById('msg-unread-dot');
    if(dot) dot.style.display = unread.length > 0 ? 'inline-block' : 'none';
  }

  buildJobList();

  // ── Top nav avatar ────────────────────────────────────────────
  function refreshSidebar(){
    const s = DB.auth.getSession() || _session || {};
    const av = document.getElementById('nav-avatar');
    if(av){
      if(s.photo){ av.innerHTML=`<img src="${s.photo}" class="w-full h-full object-cover rounded-full">`; }
      else av.textContent = s.avatar || (s.name||'?')[0];
    }
    const unread = DB.getUnread(s.email||'');
    const dot = document.getElementById('msg-unread-dot');
    if(dot) dot.style.display = unread > 0 ? 'block' : 'none';
  }
  refreshSidebar();

  // ── Applied view ──────────────────────────────────────────────
  function buildApplied(){
    const apps = DB.getApplications({studentEmail: _session.email});
    const total = apps.length;
    const reviewCount = apps.filter(a=>a.status==='review').length;
    const interviewCount = apps.filter(a=>a.status==='interview').length;
    const hiredCount = apps.filter(a=>a.status==='hired'||a.status==='finalist').length;

    const sumEl = document.getElementById('applied-summary');
    if(sumEl) sumEl.innerHTML = '총 <span class="text-brand-500 font-semibold">'+total+'건</span> 지원';

    const badge = document.getElementById('applied-badge');
    if(badge) badge.textContent = total;

    const pipeEl = document.getElementById('applied-pipeline');
    if(pipeEl) pipeEl.innerHTML = `
      <div class="flex items-center justify-between mb-6">
        <p class="font-semibold text-[13.5px] text-ink">전체 파이프라인</p>
        <span class="badge badge-blue">활성 ${total}</span>
      </div>
      <div class="flex">
        <div class="pipe-step done"><div class="pipe-dot"></div><div class="text-[11px] font-medium text-ok">지원 완료</div><div class="font-mono text-[18px] font-bold text-ink mt-0.5">${total}</div></div>
        <div class="pipe-step ${reviewCount>0?'active':''}"><div class="pipe-dot"></div><div class="text-[11px] font-medium ${reviewCount>0?'text-brand-500':'text-ink-4'}">검토 중</div><div class="font-mono text-[18px] font-bold text-ink mt-0.5">${reviewCount}</div></div>
        <div class="pipe-step ${interviewCount>0?'active':''}"><div class="pipe-dot"></div><div class="text-[11px] font-medium ${interviewCount>0?'text-brand-500':'text-ink-4'}">면접</div><div class="font-mono text-[18px] font-bold text-ink mt-0.5">${interviewCount}</div></div>
        <div class="pipe-step"><div class="pipe-dot"></div><div class="text-[11px] font-medium text-ink-4">최종 합격</div><div class="font-mono text-[18px] font-bold text-ink mt-0.5">${hiredCount}</div></div>
      </div>`;

    const cardsEl = document.getElementById('applied-cards');
    if(!cardsEl) return;
    if(apps.length === 0){
      cardsEl.innerHTML = '<div class="text-center text-ink-4 py-12 text-sm">아직 지원한 공고가 없습니다</div>';
      return;
    }
    const statusBadge = { review:'<span class="badge badge-blue">검토 중</span>', interview:'<span class="badge badge-amber">면접 예정</span>', hired:'<span class="badge badge-green">합격</span>', finalist:'<span class="badge badge-green">최종 후보</span>', rejected:'<span class="badge badge-gray">불합격</span>' };
    cardsEl.innerHTML = apps.map((a,i) => `
      <div class="card fu fu${i+3}">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0" style="background:${a.logoBg||'#F2F1EE'};color:${a.logoColor||'#6B6A68'}">${a.logo||'?'}</div>
            <div>
              <div class="font-semibold text-[14px] text-ink">${a.companyName||'—'}</div>
              <div class="text-[12.5px] text-ink-3">${a.jobTitle||'—'}</div>
            </div>
          </div>
          ${statusBadge[a.status]||''}
        </div>
        <div class="mt-4 flex items-center gap-4 text-[12px] text-ink-4">
          <span class="font-mono">${a.appliedDate||'—'} 지원</span>
          <span>·</span>
          <span>마감 ${a.deadline||'—'}</span>
          <span>·</span>
          <span class="text-ok font-medium">${a.matchScore||0}% 매칭</span>
        </div>
        ${a.interviewNote ? `<div class="mt-3 bg-ok/5 border border-ok/20 rounded-lg p-3"><p class="text-[12.5px] text-ok font-medium">🎉 면접 일정이 잡혔어요!</p><p class="text-[12px] text-ok/80 mt-0.5">${a.interviewNote}</p></div>` : `<div class="mt-3 flex gap-2"><button class="text-[12.5px] font-medium text-ink-3 hover:text-ink px-3 py-1.5 rounded-lg border border-ink-6 hover:border-ink-5" style="transition:border-color 0.15s,color 0.15s">지원서 보기</button></div>`}
      </div>`).join('');
  }
  buildApplied();

  // ── Profile view ──────────────────────────────────────────────
  function buildProfileView(s){
    s = s || DB.auth.getSession() || {};
    const apps = DB.getApplications({studentEmail: s.email || _session.email});
    const interviewCnt = apps.filter(a=>a.status==='interview').length;
    const maxScore = apps.length ? Math.max(...apps.map(a=>a.matchScore||0)) : 0;
    const avatar = s.avatar || (s.name||'?')[0];
    const schoolLine = [s.schoolName, s.major, s.year].filter(Boolean).join(' · ');

    const cardEl = document.getElementById('profile-card');
    if(cardEl) cardEl.innerHTML = `

  // ── Calendar ──────────────────────────────────────────────────
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();
  let calSelectedDay = null;

  function buildCalendar(){
    const apps = DB.getApplications({studentEmail: _session.email});
    const now = new Date();
    const firstDow = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const monthLabel = new Date(calYear, calMonth).toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
    const lblEl = document.getElementById('calendar-month-label');
    if(lblEl) lblEl.textContent = monthLabel;

    // Build event map: day -> [{type, label, color, company}]
    const evts = {};
    const addEvt = (day, obj) => { if(!evts[day]) evts[day]=[]; evts[day].push(obj); };
    apps.forEach(a=>{
      const dl = a.deadline||'';
      const dlM = dl.match(/(\d{4}\.)?(\d{1,2})\.(\d{1,2})/);
      if(dlM){
        const em = parseInt(dlM[2])-1, ed = parseInt(dlM[3]);
        const ey = dlM[1] ? parseInt(dlM[1]) : now.getFullYear();
        if(em===calMonth && ey===calYear) addEvt(ed,{type:'deadline',label:`${a.companyName||'—'} 마감`,color:'#F5621A'});
      }
      if((a.status==='interview'||a.status==='finalist') && a.interviewNote){
        const im = a.interviewNote.match(/(\d+)월\s*(\d+)일/);
        if(im){ const em=parseInt(im[1])-1,ed=parseInt(im[2]); if(em===calMonth) addEvt(ed,{type:'interview',label:`${a.companyName||'—'} 면접`,color:'#1952D9'}); }
      }
    });

    // Grid
    const grid = document.getElementById('calendar-grid');
    if(!grid) return;
    let html = '';
    for(let i=0;i<firstDow;i++) html += '<div></div>';
    for(let d=1;d<=daysInMonth;d++){
      const isToday = d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();
      const isSel = d===calSelectedDay;
      const dayEvts = evts[d]||[];
      const dow = (firstDow+d-1)%7;
      const numColor = dow===0?'color:#EF4444':dow===6?'color:#3B82F6':'color:#2D2C2A';
      html += `<div class="cal-day ${isToday&&!isSel?'today':''} ${isSel?'selected':''}" onclick="selectCalDay(${d})">
        <div class="text-[12px] font-medium text-center" style="${numColor}">${d}</div>
        ${dayEvts.slice(0,2).map(e=>`<div class="cal-dot" style="background:${e.color}"></div>`).join('')}
        ${dayEvts.length>2?`<div style="font-size:8px;color:#9C9B99;text-align:center">+${dayEvts.length-2}</div>`:''}
      </div>`;
    }
    grid.innerHTML = html;
    renderCalEvents(evts, apps);
  }

  function selectCalDay(d){
    calSelectedDay = d;
    buildCalendar();
    const apps = DB.getApplications({studentEmail: _session.email});
    const evts = {};
    const addEvt = (day, obj) => { if(!evts[day]) evts[day]=[]; evts[day].push(obj); };
    apps.forEach(a=>{
      const dl=a.deadline||''; const dlM=dl.match(/(\d{4}\.)?(\d{1,2})\.(\d{1,2})/);
      if(dlM){const em=parseInt(dlM[2])-1,ed=parseInt(dlM[3]); if(em===calMonth) addEvt(ed,{type:'deadline',label:`${a.companyName||'—'} 마감`,color:'#F5621A',app:a});}
      if((a.status==='interview'||a.status==='finalist')&&a.interviewNote){
        const im=a.interviewNote.match(/(\d+)월\s*(\d+)일/);
        if(im){const em=parseInt(im[1])-1,ed=parseInt(im[2]);if(em===calMonth)addEvt(ed,{type:'interview',label:`${a.companyName||'—'} 면접`,color:'#1952D9',app:a});}
      }
    });
    const evEl = document.getElementById('calendar-events');
    const dayEvts = evts[d]||[];
    if(!dayEvts.length){
      evEl.innerHTML = `<p class="text-sm text-ink-4 text-center py-4">${calMonth+1}월 ${d}일에 등록된 일정이 없습니다.</p>`;
    } else {
      evEl.innerHTML = `<h3 class="font-semibold text-[14px] text-ink mb-3">${calMonth+1}월 ${d}일 일정</h3>`+
        dayEvts.map(e=>`<div class="flex items-center gap-3 p-3 rounded-xl border border-ink-6 mb-2">
          <div class="w-3 h-3 rounded-full flex-shrink-0" style="background:${e.color}"></div>
          <div>
            <div class="font-medium text-[13.5px] text-ink">${e.label}</div>
            <div class="text-[11.5px] text-ink-4">${e.type==='interview'?(e.app?.interviewNote||''):(e.app?.jobTitle||e.label)}</div>
          </div>
        </div>`).join('');
    }
  }

  function renderCalEvents(evts, apps){
    const upEl = document.getElementById('calendar-upcoming');
    if(!upEl) return;
    const interviews = apps.filter(a=>a.status==='interview'||a.status==='finalist');
    const deadlines = apps.filter(a=>a.deadline);
    if(!interviews.length && !deadlines.length){
      upEl.innerHTML = '<div class="card text-center text-ink-4 text-sm py-4">이번 달 예정된 면접이 없습니다</div>';
      return;
    }
    let html = '<h3 class="font-semibold text-[14px] text-ink mb-3">이번 달 일정</h3>';
    interviews.forEach(a=>{
      html += `<div class="card flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center font-bold flex-shrink-0" style="background:#EEF3FF;color:#1952D9">${(a.logo||'?')}</div>
        <div class="flex-1"><div class="font-semibold text-[13.5px] text-ink">${a.companyName||'—'}</div>
          <div class="text-[12px] text-ink-3">${a.jobTitle||'—'} · ${a.interviewNote||'면접 일정 미정'}</div></div>
        <span class="badge badge-amber text-[10.5px]">면접</span>
      </div>`;
    });
    upEl.innerHTML = html;
  }

  function changeMonth(delta){
    calMonth += delta;
    if(calMonth < 0){ calMonth=11; calYear--; }
    if(calMonth > 11){ calMonth=0; calYear++; }
    calSelectedDay = null;
    buildCalendar();
  }

  // ── Modal ─────────────────────────────────────────────────────
  function openModal(jobId, e){
    e?.stopPropagation();
    const jobs = DB.getJobs();
    const j = jobs.find(x=>x.id===jobId);
    if(!j) return;
    currentJob = j;
    const score = computeMatchScore(j);
    const alreadyApplied = DB.hasApplied(_session.email, j.id);

    document.getElementById('modal-logo').textContent = j.logo||'?';
    document.getElementById('modal-logo').style.background = j.logoBg||'#F2F1EE';
    document.getElementById('modal-logo').style.color = j.logoColor||'#6B6A68';
    document.getElementById('modal-company').textContent = j.companyName||j.company||'—';
    document.getElementById('modal-role').textContent = j.title||j.role||'—';
    document.getElementById('modal-score').textContent = score+'% 매칭';
    document.getElementById('modal-period').textContent = j.period||'—';
    document.getElementById('modal-pay').textContent = j.pay||'—';
    document.getElementById('modal-deadline').textContent = (j.deadline||'—')+' 마감';
    document.getElementById('modal-loc').textContent = j.loc||j.location||'—';

    const applyBtn = document.getElementById('modal-apply-btn');
    if(alreadyApplied){
      applyBtn.innerHTML = '✓ 이미 지원함';
      applyBtn.style.background = '#059669';
      applyBtn.disabled = true;
    } else {
      applyBtn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> 딸깍 — 즉시 지원';
      applyBtn.style.background = '';
      applyBtn.disabled = false;
    }

    document.getElementById('apply-modal').classList.add('open');
    document.body.style.overflow='hidden';
    showJobFitAnalysis(j);
  }
  function closeModal(e){
    if(e && e.target!==document.getElementById('apply-modal')) return;
    document.getElementById('apply-modal').classList.remove('open');
    document.body.style.overflow='';
  }

  function confirmApply(){
    if(!currentJob) return;
    const alreadyApplied = DB.hasApplied(_session.email, currentJob.id);
    if(alreadyApplied) return;

    DB.createApplication({
      studentEmail: _session.email,
      jobId: currentJob.id,
      companyEmail: currentJob.companyEmail,
      companyName: currentJob.companyName||currentJob.company,
      jobTitle: currentJob.title||currentJob.role,
      studentName: _session.name,
      studentSchool: _session.schoolName,
      studentMajor: _session.major,
      studentYear: _session.year,
      studentInterests: _session.interests,
      studentBio: _session.bio,
      studentPortfolio: _session.portfolio,
      logo: currentJob.logo,
      logoBg: currentJob.logoBg,
      logoColor: currentJob.logoColor,
      matchScore: computeMatchScore(currentJob),
      appliedDate: new Date().toLocaleDateString('ko-KR'),
      deadline: currentJob.deadline,
    });

    const btn = document.getElementById('modal-apply-btn');
    btn.classList.add('ttalkkak-anim');
    btn.textContent='✓ 지원 완료!';
    btn.style.background='#059669';
    btn.disabled = true;
    setTimeout(()=>{
      document.getElementById('apply-modal').classList.remove('open');
      document.body.style.overflow='';
      btn.innerHTML='<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> 딸깍 — 즉시 지원';

      showToast('✓ '+(currentJob.companyName||currentJob.company)+' 지원 완료!');

  // ── Messages — split layout ───────────────────────────────────
  let currentMsgThread = null;

  function buildMessages() {
    const threads = DB.getThreads(_session.email);
    const listEl = document.getElementById('msg-thread-list');
    if(!listEl) return;
    if(!threads.length) {
      listEl.innerHTML = '<div class="text-center text-ink-4 py-10 px-4 text-sm">메시지가 없습니다</div>';
      return;
    }
    listEl.innerHTML = threads.map(m => {
      const partner = m.from === _session.email ? m.to : m.from;
      const isUnread = !m.read && m.to === _session.email;
      const partnerUser = DB.auth.getAll().find(u=>u.email===partner);
      const displayName = partnerUser?.companyName || partnerUser?.name || partner;
      const initials = displayName[0].toUpperCase();
      const bg = partner.includes('company') ? '#F3EEFF' : '#EEF3FF';
      const col = partner.includes('company') ? '#7C3AED' : '#1952D9';
      const isActive = currentMsgThread === partner;
      return `<div class="msg-thread-item ${isActive?'active':''}" onclick="openThread('${partner}')">
        <div class="msg-avatar flex-shrink-0" style="background:${bg};color:${col}">${initials}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2">
            <span class="font-semibold text-[13px] text-ink truncate">${displayName}</span>
            <span class="text-[10.5px] text-ink-4 font-mono flex-shrink-0">${new Date(m.timestamp).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'})}</span>
          </div>
          <p class="text-[12px] text-ink-4 truncate mt-0.5">${(m.text||'').slice(0,40)}</p>
        </div>
        ${isUnread?'<span class="w-2 h-2 rounded-full bg-brand-500 flex-shrink-0"></span>':''}
      </div>`;

            <div class="msg-avatar flex-shrink-0" style="background:${isMine?'#1952D9':''+bg};color:${isMine?'#fff':''+col}">${isMine?myInitials:initials}</div>
            <div>

      </div>

  // ── Resume upload (PDF-aware) ─────────────────────────────────
  async function handleResume(e) {
    const file = e.target.files[0];
    if(!file) return;
    const s = Object.assign({}, DB.auth.getSession() || {});
    s.resumeName = file.name;

    if(file.type === 'application/pdf') {
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let text = '';
        for(let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(' ') + '\n';
        }
        s.resumeText = text;
        s.resumePages = pdf.numPages;
      } catch(err) {
        s.resumeText = '';
      }
    }

    DB.auth.saveUser(s);
    Object.assign(_session, s);
    buildProfileView(s);
    showToast('✓ 이력서가 업로드되었습니다.');
  }

  function removeResume(){
    const s = Object.assign({}, DB.auth.getSession() || {});
    delete s.resumeName;
    delete s.resumeText;
    delete s.resumePages;
    DB.auth.saveUser(s);
    Object.assign(_session, s);
    buildProfileView(s);
    showToast('이력서가 삭제되었습니다.');
  }

  // ── AI: Resume Analysis (PDF-aware) ──────────────────────────
  function generateResumeAnalysis(s) {
    const text = s.resumeText || '';
    const hasText = text.length > 50;
    const interests = s.interests || [];
    const issues = [], strengths = [], formatting = [];

    if(!s.resumeName) {
      issues.push('이력서가 업로드되지 않았습니다. PDF 이력서를 업로드하면 정확한 분석이 가능합니다.');
      formatting.push('이력서를 업로드해야 직무별 포맷 조언을 드릴 수 있어요.');
      if(s.verified) strengths.push('학교 이메일 인증 완료 — 신뢰도 높은 프로필입니다.');
      return { issues, strengths, formatting };
    }

    if(!hasText) {
      strengths.push(`이력서(${s.resumeName}) 업로드됨 — 텍스트 추출 불가(이미지 기반 PDF일 수 있음)`);
      issues.push('PDF에서 텍스트를 읽을 수 없습니다. 텍스트 기반 PDF로 다시 업로드하면 세부 분석이 가능합니다.');
      return { issues, strengths, formatting };
    }

    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 5);
    const fullText = text.toLowerCase();

    const hasEdu = /학력|education|대학교|university|graduated/.test(fullText);
    const hasExp = /경력|경험|experience|근무|project|프로젝트|인턴/.test(fullText);
    const hasSkills = /기술|skill|역량|능력|tool|사용|활용/.test(fullText);
    const hasContact = /[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/.test(fullText);
    const hasLinkedIn = /linkedin/.test(fullText);
    const hasGitHub = /github/.test(fullText);

    const quantPattern = /\d+\s*%|\d+\s*배|\d+\s*만|\d+\s*명|\d+\s*개/;
    const quantLines = lines.filter(l => quantPattern.test(l));
    const hasQuant = quantLines.length > 0;

    const actionVerbs = ['개발','설계','구축','운영','관리','분석','기획','제작','주도','개선','증가','절감'];
    const foundVerbs = actionVerbs.filter(v => fullText.includes(v));

    const matchedInterests = interests.filter(i => fullText.includes(i.toLowerCase()));
    const unmatchedInterests = interests.filter(i => !fullText.includes(i.toLowerCase()));

    const expLines = lines.filter(l => /경력|경험|인턴|근무/.test(l.toLowerCase()));

    if(s.verified) strengths.push('학교 이메일 인증 완료 — 채용담당자 신뢰도 높음.');
    if(hasEdu) strengths.push('학력 섹션 확인됨 — 학교명과 전공이 포함되어 있습니다.');
    if(hasExp) {
      const sample = expLines[0] ? `"${expLines[0].slice(0,45)}..."` : '';
      strengths.push(`경력/경험 섹션 발견${sample ? ': ' + sample : ''}.`);
    }
    if(hasQuant) {
      const sample = quantLines[0] ? `(예: "${quantLines[0].slice(0,40).trim()}...")` : '';
      strengths.push(`수치화된 성과 ${quantLines.length}개 발견 ${sample}.`);
    }
    if(hasGitHub) strengths.push('GitHub 링크 포함됨 — 개발 직군 지원 시 유리합니다.');
    if(hasLinkedIn) strengths.push('LinkedIn 프로필 링크 포함됨.');
    if(matchedInterests.length > 0) strengths.push(`관심 직무 키워드(${matchedInterests.join(', ')})가 이력서에 포함되어 있습니다.`);
    if(foundVerbs.length >= 3) strengths.push(`능동적 동사(${foundVerbs.slice(0,4).join(', ')}) ${foundVerbs.length}개 사용됨.`);
    if(strengths.length === 0) strengths.push('기본 정보가 포함되어 있습니다. 아래 개선 포인트를 참고하세요.');

    if(!hasEdu) issues.push('학력 섹션이 명확하지 않습니다. "학력" 제목 아래 학교명 / 전공 / 입학·졸업 연도를 추가하세요.');
    if(!hasExp) issues.push('경력/프로젝트 섹션이 없습니다. 인턴, 동아리, 개인 프로젝트 등 관련 경험을 최소 1개 추가하세요.');
    if(!hasQuant) {
      const targetLine = expLines[0] ? `"${expLines[0].slice(0,50).trim()}..." 항목에` : '경력/프로젝트 항목에';
      issues.push(`${targetLine} 수치화된 성과가 없습니다. 예: "SNS 팔로워 30% 증가", "프로젝트 3개 완성" 등으로 수정하세요.`);
    }
    if(!hasContact) issues.push('이메일 주소가 발견되지 않습니다. 연락처 섹션에 이메일을 명시하세요.');
    if(!hasSkills) issues.push('기술/역량 섹션이 없습니다. 사용 가능한 툴·기술 스택을 한 곳에 정리하세요.');
    if(unmatchedInterests.length > 0) issues.push(`관심 직무(${unmatchedInterests.join(', ')}) 관련 키워드가 이력서에 없습니다. 해당 직무 경험을 명시적으로 기술하세요.`);
    if(!hasLinkedIn && (interests.includes('개발') || interests.includes('마케팅'))) {
      issues.push('LinkedIn 프로필 링크가 없습니다. 채용담당자의 60%가 LinkedIn을 확인합니다.');
    }

    const pageCount = s.resumePages || 1;
    if(pageCount > 1) formatting.push(`현재 ${pageCount}페이지 분량 — 신입/인턴 이력서는 1페이지를 권장합니다.`);
    else formatting.push('1페이지 분량 ✓ — 신입/인턴 지원에 적합합니다.');
    formatting.push('파일명을 "이름_직무_이력서.pdf" 형식으로 저장하세요 (예: 김민서_마케팅인턴_이력서.pdf).');
    if(interests.includes('개발') || interests.includes('데이터')) {
      if(!hasGitHub) formatting.push('개발·데이터 직군: GitHub 프로필 URL을 이력서 최상단에 명시하세요.');
      formatting.push('주요 프로젝트는 "기술 스택 → 본인 역할 → 성과/결과" 순으로 기술하세요.');
    }
    if(interests.includes('마케팅') || interests.includes('기획')) {
      formatting.push('마케팅/기획 직군: 각 활동의 목표·방법·결과를 수치와 함께 작성하세요.');
    }
    if(foundVerbs.length < 3) formatting.push('동사로 시작하는 문장 구조를 사용하세요: "개발했다" → "React 기반 대시보드 개발, 로딩 속도 40% 개선".');

    return { issues, strengths, formatting };
  }

  function analyzeResume(){
    const btn = document.getElementById('ai-analyze-btn');
    const result = document.getElementById('ai-result');
    const placeholder = document.getElementById('ai-placeholder');
    if(!btn||!result) return;

    btn.disabled = true;

        html += `<div class="mb-4"><p class="text-[11px] font-bold text-ok uppercase tracking-wider mb-2">강점</p><div class="space-y-1.5">`;

          html += `<div class="ai-item flex items-start gap-2 text-[12.5px]" style="animation-delay:${delay*0.07}s"><span class="text-ok mt-0.5 flex-shrink-0 font-bold">✓</span><span class="text-ink-2">${t}</span></div>`;
          delay++;
        });
        html += `</div></div>`;
      }

      if(issues.length){
        html += `<div class="mb-4"><p class="text-[11px] font-bold uppercase tracking-wider mb-2" style="color:#F5621A">개선 포인트</p><div class="space-y-1.5">`;
        issues.forEach(t=>{
          html += `<div class="ai-item flex items-start gap-2 text-[12.5px]" style="animation-delay:${delay*0.07}s"><span class="mt-0.5 flex-shrink-0 font-bold" style="color:#F5621A">!</span><span class="text-ink-2">${t}</span></div>`;
          delay++;
        });
        html += `</div></div>`;
      }

      if(formatting.length){
        html += `<div class="pt-3 border-t border-ink-7"><p class="text-[11px] font-bold text-brand-500 uppercase tracking-wider mb-2">포맷 & 전략</p><div class="space-y-1.5">`;
        formatting.forEach(t=>{

          delay++;
        });

      result.innerHTML = html;

      btn.style.cssText = 'background:#F2F1EE;color:#0C0B09;box-shadow:none;font-size:12px;padding:6px 12px';
    }, 1400);
  }

  // ── AI: Job Fit Analysis ──────────────────────────────────────
  function generateJobFitAnalysis(s, job){
    const interests = s.interests || [];
    const jobTags = job.tags || [];
    const overlap = interests.filter(i => jobTags.some(t =>
      t.toLowerCase().includes(i.toLowerCase()) || i.toLowerCase().includes(t.toLowerCase())
    ));

    const fitScore = computeMatchScore(job);
    const fitLabel = fitScore >= 80 ? '매우 적합' : fitScore >= 65 ? '적합' : '가능성 있음';
    const fitColor = fitScore >= 80 ? '#059669' : fitScore >= 65 ? '#1952D9' : '#F5621A';

    const whyFit = [];
    const highlight = [];
    const developSkills = [];

    if(overlap.length > 0) whyFit.push(`관심 직무(${overlap.join(', ')})와 공고 요건이 일치해요.`);
    if(s.major) whyFit.push(`${s.major} 전공이 이 포지션과 연관성이 있어요.`);
    if(s.verified) whyFit.push('학교 인증 프로필 — 채용담당자 신뢰도 높음.');
    if(whyFit.length === 0) whyFit.push('관심 직무를 설정하면 더 정확한 적합도를 분석할게요.');

    if(s.portfolio) highlight.push('포트폴리오를 지원서 첫 줄에 링크하세요.');
    if(s.resumeName) highlight.push('이력서에서 관련 프로젝트·경험을 상단에 배치하세요.');
    if(s.bio) highlight.push('자기소개를 이 포지션의 핵심 요건과 연결해 강조하세요.');
    if(highlight.length === 0) highlight.push('프로필을 더 채우면 구체적인 전략을 드릴 수 있어요.');

    jobTags.forEach(tag=>{
      const hasIt = interests.some(i => i.toLowerCase().includes(tag.toLowerCase()) || tag.toLowerCase().includes(i.toLowerCase()));
      if(!hasIt) developSkills.push(tag);
    });

    return { fitScore, fitLabel, fitColor, whyFit, highlight, developSkills: developSkills.slice(0,3) };
  }

  function showJobFitAnalysis(job){
    const fitEl = document.getElementById('modal-ai-fit');
    const loadingEl = document.getElementById('modal-fit-loading');
    const contentEl = document.getElementById('modal-fit-content');
    if(!fitEl||!contentEl) return;

    fitEl.classList.remove('hidden');
    contentEl.innerHTML = '';
    if(loadingEl) loadingEl.classList.remove('hidden');

    setTimeout(()=>{
      const s = DB.auth.getSession() || _session || {};
      const { fitScore, fitLabel, fitColor, whyFit, highlight, developSkills } = generateJobFitAnalysis(s, job);
      if(loadingEl) loadingEl.classList.add('hidden');

      let html = `
        <div class="flex items-center gap-3 p-3 rounded-xl mb-3" style="background:${fitColor}10;border:1px solid ${fitColor}22">
          <div class="text-center flex-shrink-0 w-14">
            <div class="font-mono font-bold text-[22px]" style="color:${fitColor}">${fitScore}</div>
            <div class="text-[10px] font-semibold mt-0.5" style="color:${fitColor}">${fitLabel}</div>
          </div>
          <div class="flex-1 min-w-0">
            <div class="fit-bar-wrap"><div class="fit-bar" style="width:0%;background:${fitColor}" id="modal-fit-bar"></div></div>
            <p class="text-[11.5px] text-ink-3 mt-1.5 leading-snug">${whyFit[0]}</p>
          </div>
        </div>`;

      if(highlight.length){
        html += `<div class="mb-2.5"><p class="text-[10.5px] font-bold text-brand-500 uppercase tracking-wider mb-1.5">강조할 점</p>`;
        highlight.forEach(t=>{
          html += `<div class="flex items-start gap-1.5 text-[12px] text-ink-2 mb-1"><span class="text-brand-400 flex-shrink-0 mt-0.5 font-bold">→</span><span>${t}</span></div>`;
        });
        html += `</div>`;
      }

      if(developSkills.length){
        html += `<div><p class="text-[10.5px] font-bold uppercase tracking-wider mb-1.5" style="color:#F5621A">개발할 스킬</p><div class="flex flex-wrap gap-1.5">`;
        developSkills.forEach(t=>{
          html += `<span class="px-2.5 py-0.5 rounded-full text-[11px] font-medium" style="background:#FFF7ED;color:#F5621A">${t}</span>`;
        });
        html += `</div></div>`;
      }

      contentEl.innerHTML = html;
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          const bar = document.getElementById('modal-fit-bar');
          if(bar) bar.style.width = fitScore + '%';
        });
      });
    }, 900);
  }
</script>
</body>
</html>
